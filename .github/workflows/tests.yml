name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test_andescode.py (server suite)
        run: python -m pytest test_andescode.py -v --tb=short

      - name: Run tests/ suite
        run: python -m pytest tests/ --ignore=tests/eval -v --tb=short

      - name: Run eval fast suite (model-free retrieval, android fixture)
        run: |
          set -euo pipefail
          python3 tests/eval/eval_runner.py --suite fast --fixture android | tee /tmp/eval_fast.log
          if grep -q "Ran 0 tests" /tmp/eval_fast.log; then
            echo "Retrieval eval reported 0 tests; failing to avoid false green."
            exit 1
          fi
